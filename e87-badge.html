    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E87 Badge — Web Bluetooth Uploader</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e1116;
        --panel: #161b22;
        --border: #2a313c;
        --fg: #d7dde5;
        --muted: #8b949e;
        --accent: #3fb950;
        --accent-dim: #238636;
        --warn: #d29922;
        --err: #f85149;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        line-height: 1.5;
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px 80px; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
      .sub code { font-family: var(--mono); color: var(--fg); }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 16px;
      }
      .label { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
      button {
        font: inherit;
        background: #21262d;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 8px 14px;
        cursor: pointer;
      }
      button:hover:not(:disabled) { border-color: #3d444d; }
      button:disabled { opacity: .45; cursor: not-allowed; }
      button.primary { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }
      button.primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .status { margin-left: auto; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: #555; }
      .dot.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
      .previewArea { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
      #preview {
        width: 184px; height: 184px; border-radius: 50%;
        border: 1px solid var(--border); object-fit: cover; background: #0b0e12;
      }
      .meta { font-size: 13px; color: var(--muted); }
      .meta b { color: var(--fg); font-weight: 600; }
      input[type=file] { font: inherit; color: var(--muted); }
      progress { width: 100%; height: 10px; }
      .logHeader { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
      .logHeader button { padding: 4px 10px; font-size: 12px; }
      #log {
        font-family: var(--mono); font-size: 12px;
        background: #0b0e12; border: 1px solid var(--border); border-radius: 8px;
        padding: 12px; height: 240px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
      }
      .log-info { color: var(--muted); }
      .log-tx { color: #58a6ff; }
      .log-rx { color: var(--accent); }
      .log-warn { color: var(--warn); }
      .log-err { color: var(--err); }
      .banner {
        background: #2d2410; border: 1px solid #5c4a12; color: var(--warn);
        border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
      }
      .hidden { display: none; }
    </style>

  // src/main.ts
  var $ = (id) => document.getElementById(id);
  var connectBtn = $("connectBtn");
  var disconnectBtn = $("disconnectBtn");
  var uploadBtn = $("uploadBtn");
  var stopBtn = $("stopBtn");
  var fileInput = $("fileInput");
  var preview = $("preview");
  var imgMeta = $("imgMeta");
  var dot = $("dot");
  var statusText = $("statusText");
  var prog = $("prog");
  var logEl = $("log");
  var unsupported = $("unsupported");
  var copyLogBtn = $("copyLogBtn");
  var clearLogBtn = $("clearLogBtn");
  function log(level, msg) {
    const line = document.createElement("div");
    line.className = `log-${level}`;
    const t = (/* @__PURE__ */ new Date()).toLocaleTimeString([], { hour12: false });
    line.textContent = `${t}  ${level.toUpperCase().padEnd(4)} ${msg}`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }
  var client = new E87Client(log);
  client.onDisconnect = () => setConnected(false);
  var encoded = null;
  function setConnected(on) {
    dot.classList.toggle("on", on);
    statusText.textContent = on ? "\uC5F0\uACB0\uB428: E87" : "\uBBF8\uC5F0\uACB0";
    connectBtn.disabled = on;
    disconnectBtn.disabled = !on;
    refreshUploadBtn();
  }
  function refreshUploadBtn() {
    uploadBtn.disabled = !(client.connected && encoded);
  }
  if (!navigator.bluetooth) {
    unsupported.classList.remove("hidden");
    connectBtn.disabled = true;
  }
  connectBtn.addEventListener("click", async () => {
    try {
      await client.connect();
      setConnected(true);
    } catch (e) {
      log("err", e.message);
    }
  });
  disconnectBtn.addEventListener("click", async () => {
    await client.disconnect();
    setConnected(false);
  });
  fileInput.addEventListener("change", async () => {
    const file = fileInput.files?.[0];
    if (!file) return;
    try {
      log("info", `encoding ${file.name}\u2026`);
      encoded = await fileToBadgeJpeg(file);
      preview.src = encoded.previewUrl;
      const kb = (encoded.jpeg.length / 1024).toFixed(1);
      const qPct = Math.round(encoded.quality * 100);
      imgMeta.innerHTML = `<b>368\xD7368</b> JPEG \xB7 <b>${kb} KB</b> \xB7 \uD488\uC9C8 ${qPct}%`;
      log("info", `encoded: ${encoded.jpeg.length} bytes (quality ${qPct}%)`);
      if (encoded.overBudget) {
        log("warn", `\uC774\uBBF8\uC9C0\uAC00 \uAD8C\uC7A5 \uC6A9\uB7C9(${Math.round(encoded.maxBytes / 1024)}KB)\uC744 \uB118\uC2B5\uB2C8\uB2E4 \u2014 \uC804\uC1A1\uC774 \uC2E4\uD328\uD560 \uC218 \uC788\uC5B4\uC694.`);
      }
      refreshUploadBtn();
    } catch (e) {
      log("err", e.message);
    }
  });
  uploadBtn.addEventListener("click", async () => {
    if (!encoded) return;
    uploadBtn.disabled = true;
    stopBtn.disabled = false;
    prog.value = 0;
    try {
      await client.uploadJpeg(encoded.jpeg, (sent, total) => {
        prog.value = Math.round(sent / total * 100);
      });
      prog.value = 100;
    } catch (e) {
      log("err", e.message);
    } finally {
      stopBtn.disabled = true;
      refreshUploadBtn();
    }
  });
  stopBtn.addEventListener("click", () => {
    client.abort();
    log("warn", "abort requested");
  });
  copyLogBtn.addEventListener("click", async () => {
    const text = logEl.innerText;
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }
    const original = copyLogBtn.textContent;
    copyLogBtn.textContent = "\uBCF5\uC0AC\uB428 \u2713";
    setTimeout(() => copyLogBtn.textContent = original, 1200);
  });
  clearLogBtn.addEventListener("click", () => {
    logEl.replaceChildren();

  log("info", "ready \u2014 connect the badge (single-press its Bluetooth button first)");
})();
